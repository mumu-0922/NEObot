name: mm-chat

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-postgres-env: &postgres-env
  POSTGRES_DB: ${POSTGRES_DB:-neo_chat}
  POSTGRES_USER: ${POSTGRES_USER:-neo_chat}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}

x-redis-env: &redis-env
  REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-redis}

x-minio-root-env: &minio-root-env
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-root}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-root-secret}

x-minio-app-env: &minio-app-env
  S3_BUCKET: ${S3_BUCKET:-neo-chat-files}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-mm-chat-files}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me-minio-user-secret}

x-backend-env: &backend-env
  MM_CHAT_ADDR: ${MM_CHAT_ADDR:-:8080}
  MM_CHAT_VERSION: ${MM_CHAT_VERSION:-single-server-dev}
  DATABASE_URL: ${DATABASE_URL:-postgres://neo_chat:change-me-postgres@postgres:5432/neo_chat?sslmode=disable}
  DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
  DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
  DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-30m}
  REDIS_URL: ${REDIS_URL:-redis://:change-me-redis@redis:6379/0}
  REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-mm-chat}
  REDIS_RUN_CANCEL_TTL: ${REDIS_RUN_CANCEL_TTL:-10m}
  REDIS_SESSION_CACHE_TTL: ${REDIS_SESSION_CACHE_TTL:-5m}
  REDIS_RATE_LIMIT_ENABLED: ${REDIS_RATE_LIMIT_ENABLED:-true}
  REDIS_RATE_LIMIT_REQUESTS: ${REDIS_RATE_LIMIT_REQUESTS:-120}
  REDIS_RATE_LIMIT_WINDOW: ${REDIS_RATE_LIMIT_WINDOW:-1m}
  AUTH_MODE: ${AUTH_MODE:-required}
  AUTH_BOOTSTRAP_TOKEN: ${AUTH_BOOTSTRAP_TOKEN:?set AUTH_BOOTSTRAP_TOKEN before starting mm-chat}
  AUTH_BOOTSTRAP_USER_ID: ${AUTH_BOOTSTRAP_USER_ID:-00000000-0000-0000-0000-000000000001}
  AUTH_BOOTSTRAP_DISPLAY_NAME: ${AUTH_BOOTSTRAP_DISPLAY_NAME:-Owner}
  AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-168h}
  PROVIDER_TYPE: ${PROVIDER_TYPE:-openai_compatible}
  PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-https://your-openai-compatible-relay.example/v1}
  PROVIDER_MODEL: ${PROVIDER_MODEL:-gpt-5.5}
  PROVIDER_API_KEY: ${PROVIDER_API_KEY:-change-me-provider-key}
  PROVIDER_TIMEOUT: ${PROVIDER_TIMEOUT:-2m}
  STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
  LOCAL_STORAGE_DIR: ${LOCAL_STORAGE_DIR:-./data/files}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-neo-chat-files}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-mm-chat-files}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me-minio-user-secret}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_BUCKET_AUTO_CREATE: ${S3_BUCKET_AUTO_CREATE:-false}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment: *postgres-env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment: *redis-env
    command:
      - sh
      - -euc
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test:
        ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - private

  minio:
    image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    environment: *minio-root-env
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - private

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    environment:
      <<: [*minio-root-env, *minio-app-env]
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio" >&2
          sleep 2
        done

        mc mb --ignore-existing "local/$$S3_BUCKET"
        cat > /tmp/mm-chat-files-policy.json <<EOF_POLICY
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "s3:GetBucketLocation",
                "s3:ListBucket",
                "s3:GetObject",
                "s3:PutObject",
                "s3:DeleteObject"
              ],
              "Resource": [
                "arn:aws:s3:::$$S3_BUCKET",
                "arn:aws:s3:::$$S3_BUCKET/*"
              ]
            }
          ]
        }
        EOF_POLICY
        if ! mc admin user add local "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"; then
          mc admin user enable local "$$S3_ACCESS_KEY_ID"
        fi

        if ! mc admin policy create local mm-chat-files /tmp/mm-chat-files-policy.json; then
          mc admin policy info local mm-chat-files >/dev/null
        fi
        mc admin policy attach local mm-chat-files --user "$$S3_ACCESS_KEY_ID"

        mc alias set app http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY" >/dev/null
        printf 'mm-chat init check' > /tmp/mm-chat-init-check.txt
        mc cp /tmp/mm-chat-init-check.txt "app/$$S3_BUCKET/.mm-chat-init-check" >/dev/null
        mc stat "app/$$S3_BUCKET/.mm-chat-init-check" >/dev/null
        mc rm "app/$$S3_BUCKET/.mm-chat-init-check" >/dev/null
    networks:
      - private

  backend:
    image: mm-chat/backend:local
    build: *backend-build
    restart: unless-stopped
    profiles: ["app"]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - private

  migrate:
    image: mm-chat/backend:local
    build: *backend-build
    restart: "no"
    profiles: ["ops"]
    environment:
      MM_CHAT_ADDR: ${MM_CHAT_ADDR:-:8080}
      MM_CHAT_VERSION: ${MM_CHAT_VERSION:-single-server-dev}
      DATABASE_URL: ${DATABASE_URL:-postgres://neo_chat:change-me-postgres@postgres:5432/neo_chat?sslmode=disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-30m}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/usr/local/bin/mm-chat-migrate", "up"]
    networks:
      - private

  minio-client:
    image: quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z
    profiles: ["ops"]
    environment:
      <<: [*minio-root-env, *minio-app-env]
    volumes:
      - ./backup/minio:/backup
    networks:
      - private

networks:
  private:
    driver: bridge
